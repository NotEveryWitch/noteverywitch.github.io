<!DOCTYPE html>

<head>

    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent-color: #bb86fc;
            --steam-color: #1b2838;
            --patreon-color: #ff424d;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            background-image: url('avatar.png');
            background-size: cover;
            background-position: center;
            display: inline-block;
        }

        h1 {
            display: flex;
            font-size: 1.6rem;
            margin-bottom: 8px;
            align-items: center;
            align-content: center;
            justify-content: center;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .section-title {
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin: 20px 0 10px 5px;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-card {
            background-color: var(--card-bg);
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #333;
            display: flex;
            align-items: center;
        }

        .link-card:hover {
            transform: scale(1.02);
            border-color: var(--accent-color);
            background-color: #252525;
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            object-fit: contain;
        }

        .steam-btn {
            border-color: #66c0f4;
        }

        .nsfw-badge {
            background: #cf6679;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-left: 5px;
        }

        .social-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin: 40px 0 15px 0;
            opacity: 0.8;
            letter-spacing: 1.5px;
            font-weight: 600;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-bottom: 20px;
        }

        .social-icon {
            width: 28px;
            height: 28px;
            transition: 0.2s;
            opacity: 0.7;
        }

        .social-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .disclaimer {
            font-size: 0.75rem;
            color: #555;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        const url = new URL(window.location.href);
        const params = url.searchParams;
        let hasUtm = false;

        Array.from(params.keys()).forEach(key => {
          if (key.startsWith('utm_')) {
            params.delete(key);
            hasUtm = true;
          }
        });

        if (hasUtm) {
          const cleanUrl = url.pathname + (params.toString() ? '?' + params.toString() : '') + url.hash;
          window.history.replaceState({}, document.title, cleanUrl);
        }
      }, 500);
    });
